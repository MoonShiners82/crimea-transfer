name: Build and Deploy to Yandex Cloud

on:
  push:
    branches: [main]

env:
  REGISTRY: cr.yandex.ru/bbahbe2vitdn4tlj9a5c
  IMAGE_NAME: crimea-transfer
  FOLDER_ID: b1gvnuqsklois79c98aj

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Authenticate with Yandex Cloud
        run: |
          echo '${{ secrets.YC_SA_JSON_KEY }}' > /tmp/key.json
          yc config profile create github-action
          yc auth activate --json-key /tmp/key.json
          rm /tmp/key.json
          yc config set cloud-id b1gvnuqsklois79c98aj
          yc config set folder-id ${{ env.FOLDER_ID }}

      - name: Configure Docker for Yandex Registry
        run: yc container registry configure-docker

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Authenticate with Yandex Cloud
        run: |
          echo '${{ secrets.YC_SA_JSON_KEY }}' > /tmp/key.json
          yc config profile create github-action
          yc auth activate --json-key /tmp/key.json
          rm /tmp/key.json
          yc config set cloud-id b1gvnuqsklois79c98aj
          yc config set folder-id ${{ env.FOLDER_ID }}

      - name: Get latest image ID
        id: image
        run: |
          IMAGE_ID=$(yc container image list --registry-id bbahbe2vitdn4tlj9a5c --format json | jq -r '.[0].id')
          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT

      - name: Deploy container
        run: |
          yc container serverless container create \
            --name crimea-transfer \
            --memory 512m \
            --cores 1 \
            --execution-timeout 300 \
            --image-id ${{ steps.image.outputs.image_id }} \
            --env "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --env "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" \
            --env "NEXTAUTH_URL=https://crimea-transfer.${{ env.FOLDER_ID }}.containers.yandexcloud.net" \
            --env "PLUSOFON_API_KEY=${{ secrets.PLUSOFON_API_KEY }}" \
            --port 80=3000 \
            --network-ids default
